name: Build tun.ko and wireguard.ko modules

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  SOURCE_REPO: https://github.com/BPI-SINOVOIP/BPI-R4PRO-8X-OPENWRT-V24.10.0-Master-Devel.git
  SOURCE_BRANCH: main
  OPENWRT_DIR: openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Checkout Build Repo
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib \
            g++-multilib genisoimage git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto \
            xxd zlib1g-dev zstd

      - name: Clone Source Tree
        run: |
          git clone --depth 1 --branch "${SOURCE_BRANCH}" "${SOURCE_REPO}" "${OPENWRT_DIR}"

      - name: Update And Install Feeds
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          ./scripts/feeds update -a
          sed -i 's/PKG_MIRROR_HASH:=1138649f64ac3982330925c38c795ca6860289adbd95755991f80afa30ebdea7/PKG_MIRROR_HASH:=93fa1a61e810ed7753801f007e3ee3fa425f93ba65e19dbb64aaa78d061b239b/' package/boot/arm-trusted-firmware-mediatek/Makefile
          ./scripts/feeds install -a

      - name: Configure and Enable TUN/WireGuard
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          # Minimal config — ONLY target + TUN + WG, nothing else
          # This avoids recursive dependency issues from luci-app-fchomo, hostapd, etc.
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_bananapi_bpi-r4-pro-8x=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-wireguard=y
          # Disable everything that causes recursive dependencies
          # CONFIG_PACKAGE_luci-app-fchomo is not set
          # CONFIG_PACKAGE_hostapd is not set
          # CONFIG_PACKAGE_hostapd-basic is not set
          EOF
          make defconfig
          # Verify
          grep -E "CONFIG_TUN|CONFIG_WIREGUARD|kmod-tun|kmod-wireguard" .config
          echo "=== Check for recursive deps ==="
          grep -i "recursive" tmp/.config-package.in 2>/dev/null || echo "No recursive deps"

      - name: Build Toolchain
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          make toolchain/install -j$(nproc) V=s 2>&1 | tail -10

      - name: Build Kernel and Modules
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set -eo pipefail
          
          # Step 0: Download sources (firmware, kernel, etc.)
          echo "=== Downloading sources ==="
          make download -j$(nproc) 2>&1 | tail -20
          
          # Step 1: Build kernel (full log, no tail)
          echo "=== Building kernel (pass 1) ==="
          make target/linux/compile -j$(nproc) V=s 2>&1 | tee /tmp/kernel-build.log | tail -50 || {
            echo "Pass 1 failed — showing errors:"
            grep -i "error:" /tmp/kernel-build.log | tail -20
            exit 1
          }

          # Step 2: Patch kernel .config to enable TUN and WireGuard as modules
          KSRC="build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic/linux-6.6.93"
          echo "=== Patching kernel .config ==="
          ls "$KSRC/.config" 2>/dev/null && echo "KSRC exists" || echo "KSRC does not exist"
          
          for cfgfile in "$KSRC/.config" "$KSRC/.config.target" "$KSRC/.config.set"; do
            if [ -f "$cfgfile" ]; then
              echo "Patching $cfgfile"
              sed -i 's/# CONFIG_TUN is not set/CONFIG_TUN=m/g' "$cfgfile"
              sed -i 's/# CONFIG_TUN_VNET_CROSS_LE is not set/CONFIG_TUN_VNET_CROSS_LE=y/g' "$cfgfile"
              sed -i 's/# CONFIG_WIREGUARD is not set/CONFIG_WIREGUARD=m/g' "$cfgfile"
              grep -E 'CONFIG_TUN|CONFIG_WIREGUARD' "$cfgfile" || true
            fi
          done
          
          # Step 3: Force kernel module rebuild
          echo "=== Forcing kernel rebuild ==="
          rm -f staging_dir/target-aarch64_cortex-a53_musl/stamp/.linux_compile 2>/dev/null || true
          rm -f staging_dir/target-aarch64_cortex-a53_musl/stamp/.linux_install 2>/dev/null || true
          rm -f "$KSRC/.config.prev" "$KSRC/.config.modules.save" 2>/dev/null || true
          
          # Step 4: Rebuild kernel with TUN/WG modules (full log)
          echo "=== Rebuilding kernel with TUN/WG (pass 2) ==="
          set -eo pipefail
          make target/linux/compile -j$(nproc) V=s 2>&1 | tee /tmp/kernel-rebuild.log | tail -50 || {
            echo "Pass 2 failed — showing errors:"
            grep -i "error:" /tmp/kernel-rebuild.log | tail -20
            exit 1
          }
          
          # Step 5: Find and collect modules
          echo "=== Finding tun.ko ==="
          find build_dir/ -name "tun.ko" -exec ls -la {} \;
          echo "=== Finding wireguard.ko ==="
          find build_dir/ -name "wireguard.ko" -exec ls -la {} \; 2>/dev/null || echo "wireguard.ko not found"
          
          mkdir -p /tmp/modules
          find build_dir/ -name "tun.ko" -exec cp {} /tmp/modules/ \;
          find build_dir/ -name "wireguard.ko" -exec cp {} /tmp/modules/ \; 2>/dev/null || true
          
          echo "=== Checking vermagic ==="
          strings /tmp/modules/tun.ko 2>/dev/null | grep vermagic || echo "no vermagic found"
          
          ls -la /tmp/modules/
          
          # Show errors from logs
          echo "=== Pass 1 errors ==="
          grep -i "error:" /tmp/kernel-build.log | tail -10 || echo "no errors"
          echo "=== Pass 2 errors ==="
          grep -i "error:" /tmp/kernel-rebuild.log | tail -10 || echo "no errors"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-logs
          path: |
            /tmp/kernel-build.log
            /tmp/kernel-rebuild.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules-tun-wireguard
          path: /tmp/modules/*
          if-no-files-found: error
          retention-days: 30
