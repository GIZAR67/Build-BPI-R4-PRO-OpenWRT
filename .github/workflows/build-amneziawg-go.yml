name: Build amneziawg-go (aarch64)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Clone amneziawg-go
        run: git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-go.git
      - name: Cross-compile for aarch64 (static)
        working-directory: amneziawg-go
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o amneziawg-go-arm64 .
          file amneziawg-go-arm64 || true
          ./amneziawg-go-arm64 --version 2>/dev/null || true
          ls -la amneziawg-go-arm64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-go-aarch64
          path: amneziawg-go/amneziawg-go-arm64
          if-no-files-found: error
