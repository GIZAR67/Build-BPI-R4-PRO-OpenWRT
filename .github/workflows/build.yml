name: Build BPI-R4-PRO OpenWrt

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  SOURCE_REPO: https://github.com/BPI-SINOVOIP/BPI-R4PRO-8X-OPENWRT-V24.10.0-Master-Devel.git
  SOURCE_BRANCH: main
  OPENWRT_DIR: openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Checkout Build Repo
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib \
            g++-multilib genisoimage git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto \
            xxd zlib1g-dev zstd

      - name: Clone Source Tree
        run: |
          git clone --depth 1 --branch "${SOURCE_BRANCH}" "${SOURCE_REPO}" "${OPENWRT_DIR}"

      - name: Enable TUN and WireGuard in Kernel Config
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          # Enable CONFIG_TUN and CONFIG_WIREGUARD in kernel config
          KCONF="target/linux/mediatek/filogic/config-6.6"
          echo "=== Before ==="
          grep -E 'CONFIG_TUN|CONFIG_WIREGUARD' "$KCONF" || echo "(none found)"
          
          # Replace or add CONFIG_TUN
          sed -i 's/# CONFIG_TUN is not set/CONFIG_TUN=y/' "$KCONF"
          sed -i 's/# CONFIG_TUN_VNET_CROSS_LE is not set/CONFIG_TUN_VNET_CROSS_LE=y/' "$KCONF"
          
          # Replace or add CONFIG_WIREGUARD
          sed -i 's/# CONFIG_WIREGUARD is not set/CONFIG_WIREGUARD=y/' "$KCONF"
          
          # Add if not present
          grep -q 'CONFIG_TUN=y' "$KCONF" || echo 'CONFIG_TUN=y' >> "$KCONF"
          grep -q 'CONFIG_WIREGUARD=y' "$KCONF" || echo 'CONFIG_WIREGUARD=y' >> "$KCONF"
          
          echo "=== After ==="
          grep -E 'CONFIG_TUN|CONFIG_WIREGUARD' "$KCONF"

      - name: Update And Install Feeds
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          bash ../scripts/install-feeds.sh

      - name: Remove Broken Packages
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          # Remove mihomo and its luci app — they fail to build (Go dns library error)
          rm -rf feeds/small/mihomo feeds/small/luci-app-mihomo
          rm -rf package/feeds/small/mihomo package/feeds/small/luci-app-mihomo
          # Also remove from kenzo if present
          rm -rf feeds/kenzo/mihomo feeds/kenzo/luci-app-mihomo
          rm -rf package/feeds/kenzo/mihomo package/feeds/kenzo/luci-app-mihomo
          echo "Removed mihomo packages"

      - name: Load Build Config
        run: |
          cp .config "${OPENWRT_DIR}/.config"

      - name: Expand Config
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          make defconfig
          # Verify mihomo is not enabled
          if grep -q 'CONFIG_PACKAGE_mihomo=y' .config; then
            echo "ERROR: mihomo still enabled!"
            exit 1
          fi
          grep -E "CONFIG_TARGET_|CONFIG_TARGET_ROOTFS_(INITRAMFS|INITRAMFS_SEPARATE|SQUASHFS)" .config

      - name: Force TUN and WireGuard in Kernel Config
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          # Patch ALL kernel config files that feed into the build
          # 1. filogic target config
          KCONF="target/linux/mediatek/filogic/config-6.6"
          sed -i '/CONFIG_TUN[= ]/d; /CONFIG_TUN_VNET_CROSS_LE/d; /CONFIG_WIREGUARD[= ]/d' "$KCONF"
          echo "" >> "$KCONF"
          echo "CONFIG_TUN=y" >> "$KCONF"
          echo "CONFIG_WIREGUARD=y" >> "$KCONF"
          
          # 2. generic config (this one was overriding filogic!)
          GCONF="target/linux/generic/config-6.6"
          sed -i 's/# CONFIG_TUN is not set/CONFIG_TUN=y/' "$GCONF"
          sed -i 's/# CONFIG_WIREGUARD is not set/CONFIG_WIREGUARD=y/' "$GCONF"
          
          echo "=== filogic config ==="
          grep -E 'CONFIG_TUN|CONFIG_WIREGUARD' "$KCONF"
          echo "=== generic config ==="
          grep -E 'CONFIG_TUN|CONFIG_WIREGUARD' "$GCONF"

      - name: Patch .config.target After Generation
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          # Strategy: patch kernel Kconfig files to make TUN and WireGuard default y
          # This ensures olddefconfig picks them up even if kconfig.pl outputs "not set"
          
          # Find kernel source dir
          KSRC="build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic/linux-6.6.93"
          
          # Patch TUN Kconfig: drivers/net/Kconfig
          TUN_KC="$KSRC/drivers/net/Kconfig"
          if [ -f "$TUN_KC" ]; then
            echo "=== Patching TUN Kconfig ==="
            # Add "default y" after "config TUN" line
            sed -i '/^config TUN$/{n;s/\ttristate/\ttristate\n\tdefault y/}' "$TUN_KC" 2>/dev/null || true
            grep -A3 "^config TUN$" "$TUN_KC" | head -5
          else
            echo "TUN Kconfig not found at $TUN_KC — will patch after kernel source is prepared"
          fi
          
          # Patch WireGuard Kconfig: net/wireguard/Kconfig
          WG_KC="$KSRC/net/wireguard/Kconfig"
          if [ -f "$WG_KC" ]; then
            echo "=== Patching WireGuard Kconfig ==="
            sed -i '/^config WIREGUARD$/{n;s/\ttristate/\ttristate\n\tdefault y/}' "$WG_KC" 2>/dev/null || true
            grep -A3 "^config WIREGUARD$" "$WG_KC" | head -5
          else
            echo "WireGuard Kconfig not found at $WG_KC — will patch after kernel source is prepared"
          fi
          
          # Also wrap kconfig.pl to force TUN/WG in output
          KCONFIG_PL="scripts/kconfig.pl"
          cp "$KCONFIG_PL" scripts/kconfig.pl.real
          
          printf '#!/usr/bin/perl\n' > "$KCONFIG_PL"
          printf '# Wrapper: run real kconfig.pl, filter output to force TUN/WG\n' >> "$KCONFIG_PL"
          printf 'open(my $pipe, "-|", "/usr/bin/perl", $0 . ".real", @ARGV) or die "Cannot run: $!";\n' >> "$KCONFIG_PL"
          printf 'while (my $line = <$pipe>) {\n' >> "$KCONFIG_PL"
          printf '    $line =~ s/# CONFIG_TUN is not set/CONFIG_TUN=y/;\n' >> "$KCONFIG_PL"
          printf '    $line =~ s/# CONFIG_TUN_VNET_CROSS_LE is not set/CONFIG_TUN_VNET_CROSS_LE=y/;\n' >> "$KCONFIG_PL"
          printf '    $line =~ s/# CONFIG_WIREGUARD is not set/CONFIG_WIREGUARD=y/;\n' >> "$KCONFIG_PL"
          printf '    print $line;\n' >> "$KCONFIG_PL"
          printf '}\n' >> "$KCONFIG_PL"
          printf 'close($pipe);\n' >> "$KCONFIG_PL"
          printf 'exit($? >> 8);\n' >> "$KCONFIG_PL"
          chmod +x "$KCONFIG_PL"
          
          echo "=== kconfig.pl + Kconfig patches applied ==="

      - name: Prepare Linux Firmware Source
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          make package/firmware/linux-firmware/download -j1 V=s
          make package/firmware/linux-firmware/prepare -j1 V=s

      - name: Download Sources
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          find dl -size -1024c -delete
          make download -j"$(nproc)" || make download -j1 V=s

      - name: Patch Kernel Kconfig for TUN and WireGuard
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          # Now kernel source is prepared — patch Kconfig files
          KSRC="build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic/linux-6.6.93"
          
          echo "=== Patching TUN Kconfig ==="
          TUN_KC="$KSRC/drivers/net/Kconfig"
          if [ -f "$TUN_KC" ]; then
            # Replace "config TUN\n\ttristate" with "config TUN\n\ttristate\n\tdefault y"
            sed -i '/^config TUN$/{n;/tristate/{s/tristate/tristate\n\tdefault y/}}' "$TUN_KC"
            grep -A5 "^config TUN$" "$TUN_KC" | head -6
          else
            echo "ERROR: $TUN_KC not found!"
            find "$KSRC" -name Kconfig -path "*/net/*" | head -10
          fi
          
          echo "=== Patching WireGuard Kconfig ==="
          WG_KC="$KSRC/net/wireguard/Kconfig"
          if [ -f "$WG_KC" ]; then
            sed -i '/^config WIREGUARD$/{n;/tristate/{s/tristate/tristate\n\tdefault y/}}' "$WG_KC"
            grep -A5 "^config WIREGUARD$" "$WG_KC" | head -6
          else
            echo "ERROR: $WG_KC not found!"
            find "$KSRC" -name Kconfig -path "*wireguard*" | head -5
          fi

      - name: Build Firmware
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          # Step 1: Run make to unpack kernel source and generate configs
          # This will fail or succeed — we just need kernel source unpacked
          timeout 300 make -j"$(nproc)" 2>&1 | tail -10 || true
          
          # Step 2: Patch kernel Kconfig files NOW — kernel source is unpacked
          KSRC="build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic/linux-6.6.93"
          echo "=== Patching TUN Kconfig ==="
          TUN_KC="$KSRC/drivers/net/Kconfig"
          if [ -f "$TUN_KC" ]; then
            sed -i '/^config TUN$/{n;/tristate/{s/tristate/tristate\n\tdefault y/}}' "$TUN_KC"
            grep -A5 "^config TUN$" "$TUN_KC" | head -6
          else
            echo "TUN Kconfig not found — searching..."
            find "$KSRC" -name Kconfig | xargs grep -l "config TUN" 2>/dev/null | head -5
          fi
          
          echo "=== Patching WireGuard Kconfig ==="
          WG_KC="$KSRC/net/wireguard/Kconfig"
          if [ -f "$WG_KC" ]; then
            sed -i '/^config WIREGUARD$/{n;/tristate/{s/tristate/tristate\n\tdefault y/}}' "$WG_KC"
            grep -A5 "^config WIREGUARD$" "$WG_KC" | head -6
          else
            echo "WG Kconfig not found — searching..."
            find "$KSRC" -name Kconfig | xargs grep -l "config WIREGUARD" 2>/dev/null | head -5
          fi
          
          # Step 3: Patch .config files directly too
          for cfgfile in "$KSRC/.config" "$KSRC/.config.target" "$KSRC/.config.set"; do
            if [ -f "$cfgfile" ]; then
              echo "Patching $cfgfile"
              sed -i 's/# CONFIG_TUN is not set/CONFIG_TUN=y/g' "$cfgfile"
              sed -i 's/# CONFIG_WIREGUARD is not set/CONFIG_WIREGUARD=y/g' "$cfgfile"
              grep -E 'CONFIG_TUN|CONFIG_WIREGUARD' "$cfgfile" || true
            fi
          done
          
          # Step 4: Rebuild with patched Kconfig + .config
          echo "=== Rebuilding ==="
          make -j"$(nproc)" || make -j1 V=s

      - name: Verify Official SD Card Image
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          ls -lh bin/targets/mediatek/filogic
          test -f bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-sdcard.img.gz

      - name: Prepare Release Files
        id: meta
        run: |
          BUILD_DATE="$(date -u +%Y%m%d-%H%M)"
          SOURCE_COMMIT="$(git -C "${OPENWRT_DIR}" rev-parse HEAD)"
          TAG="bpi-r4-pro-${BUILD_DATE}-r${GITHUB_RUN_ID}a${GITHUB_RUN_ATTEMPT}"
          mkdir -p release
          cp -a "${OPENWRT_DIR}/bin/targets/mediatek/filogic/." release/
          cp "${OPENWRT_DIR}/.config" release/build.config
          rm -rf release/packages
          {
            echo "Source repository: ${SOURCE_REPO}"
            echo "Source branch: ${SOURCE_BRANCH}"
            echo "Source commit: ${SOURCE_COMMIT}"
            echo "GitHub Actions run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > release/RELEASE.txt
          echo "build_date=${BUILD_DATE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpi-r4-pro-openwrt-${{ steps.meta.outputs.build_date }}
          path: release/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: BPI-R4-PRO OpenWrt ${{ steps.meta.outputs.build_date }}
          body_path: release/RELEASE.txt
          files: release/*
          fail_on_unmatched_files: true
